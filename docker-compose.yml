
services:
  db:
    image: postgres:15-alpine
    container_name: video_editor_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auto_video_editor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: video_editor_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
