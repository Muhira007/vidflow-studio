# Vidflow Studio — Production Docker Compose
# Usage: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: vidflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-vidflow_studio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vidflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: vidflow-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - APP_HOME=/home/app
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-vidflow_studio}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - source_data:/home/app/source
      - output_data:/home/app/output
      - ./logs:/home/app/logs
      - ./frontend/public/covers:/home/app/frontend/public/covers
    ports:
      - "127.0.0.1:8000:8000"

  celery:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: vidflow-celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1
    env_file:
      - .env.production
    environment:
      - APP_HOME=/home/app
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-vidflow_studio}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - source_data:/home/app/source
      - output_data:/home/app/output
      - ./logs:/home/app/logs
      - ./frontend/public/covers:/home/app/frontend/public/covers

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: vidflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - output_data:/home/app/output:ro

volumes:
  postgres_data:
  redis_data:
  source_data:
  output_data:
