# Vidflow Studio Nginx Configuration
# HTTPS with HTTP redirect + reverse proxy for API + serve static frontend

# Rate limiting zone — 100 req/menit per IP untuk API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name app.muhirastore.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name app.muhirastore.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Maximum upload size
    client_max_body_size 2G;

    # ─── Frontend Static Files ───
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Backend API ───
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ─── API Docs ───
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ─── Internal file serving (X-Accel-Redirect dari backend) ───
    location /_download/ {
        internal;
        alias /home/app/output/;
        add_header Content-Disposition "attachment";
    }

    # ─── Video Streaming ───
    location /api/fs/stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }
}
